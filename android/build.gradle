buildscript {
    ext {
        buildToolsVersion = "35.0.0"
        minSdkVersion = 24
        compileSdkVersion = 35
        targetSdkVersion = 35
        supportLibVersion = "35.0.0"
        kotlinVersion = "2.0.21"
        kotlin_version = kotlinVersion
        RNNKotlinVersion = kotlinVersion
        firebaseVersion = "24.1.0"
        ndkVersion = "27.1.12297006"
    }
    repositories {
        google()
        jcenter()
        mavenCentral()
        mavenLocal()
        // hms
        maven { url 'https://developer.huawei.com/repo/'}
    }
    dependencies {
        // AGP version must be explicit for com.huawei.agconnect (dependency lock + plugin check)
        classpath("com.android.tools.build:gradle:8.7.2")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath('com.google.gms:google-services:4.4.2')
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:2.0.21")
        classpath("org.jetbrains.kotlin.plugin.compose:org.jetbrains.kotlin.plugin.compose.gradle.plugin:2.0.21")

        // NOTE: Do not place your application dependencies here; they belong
        // in the individual module build.gradle files

        // hms
        classpath 'com.huawei.agconnect:agcp:1.9.1.301'
    }

    configurations.classpath {
        resolutionStrategy.activateDependencyLocking()
    }
}

allprojects {
    repositories {
        google()
        jcenter()
        mavenCentral()
        mavenLocal()
        maven {
            url "$rootDir/../detox/node_modules/detox/Detox-android"
        }
        maven { url 'https://jitpack.io' }
        maven { url 'https://developer.huawei.com/repo/' }
    }
}

apply plugin: "com.facebook.react.rootproject"

dependencyLocking {
    lockAllConfigurations()
}
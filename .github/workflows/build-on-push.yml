---
name: Build on Push

on:
  push:
    branches:
      - main
      - master

env:
  NODE_VERSION: 22.14.0
  TERM: xterm
  # NOTE: Provisioning profile secrets must be generated with `base64 -w 0` on Linux (no line wraps)

jobs:
  build-android:
    name: Build Android APK
    if: false  # 暂时禁用，只编译 iOS
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install npm dependencies
        run: npm ci --ignore-scripts

      - name: Apply patches
        run: npx patch-package

      - name: Generate assets
        run: node scripts/generate-assets.js

      - name: Import Compass Icons font
        run: |
          cp node_modules/@mattermost/compass-icons/font/compass-icons.ttf assets/fonts/
          cp node_modules/@mattermost/compass-icons/font/compass-icons.ttf android/app/src/main/assets/fonts/

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Jetify Android libraries
        run: ./node_modules/.bin/jetify

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"

      - name: Install Fastlane
        run: bundle install
        working-directory: fastlane

      - name: Build Android APK
        env:
          CI: "true"
          NODE_ENV: production
          BABEL_ENV: production
          NODE_OPTIONS: "--max_old_space_size=12000"
        run: bundle exec fastlane android build --env android.release
        working-directory: fastlane

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-${{ github.run_id }}
          path: "*.apk"

  build-ios:
    name: Build iOS
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.1'

      - name: Ensure correct Xcode and clean caches
        run: |
          sudo xcode-select -s /Applications/Xcode_26.1.app
          sudo xcodebuild -license accept || true
          echo "DEVELOPER_DIR=/Applications/Xcode_26.1.app/Contents/Developer" >> $GITHUB_ENV
          echo "SDKROOT=$(xcrun --sdk macosx --show-sdk-path)" >> $GITHUB_ENV
          echo "/Applications/Xcode_26.1.app/Contents/Developer/Toolchains/XcodeDefault.xctoolchain/usr/bin" >> $GITHUB_PATH
          export DEVELOPER_DIR=/Applications/Xcode_26.1.app/Contents/Developer
          export SDKROOT=$(xcrun --sdk macosx --show-sdk-path)
          export PATH="$DEVELOPER_DIR/Toolchains/XcodeDefault.xctoolchain/usr/bin:$PATH"
          echo "=== Xcode Diagnostics ==="
          xcode-select -p
          xcodebuild -version
          echo "SDKROOT=$SDKROOT"
          which swift
          swift --version
          xcrun --sdk iphoneos swift --version || true
          echo "=== Cleaning caches ==="
          rm -rf ~/Library/Developer/Xcode/DerivedData
          rm -rf ~/Library/Developer/Xcode/DerivedData/ModuleCache.noindex
          pod cache clean --all || true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install npm dependencies
        run: npm ci --ignore-scripts

      - name: Apply patches
        run: npx patch-package

      - name: Generate assets
        run: node scripts/generate-assets.js

      - name: Import Compass Icons font
        run: |
          cp node_modules/@mattermost/compass-icons/font/compass-icons.ttf assets/fonts/
          cp node_modules/@mattermost/compass-icons/font/compass-icons.ttf android/app/src/main/assets/fonts/

      - name: Install signing certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          p12-password: ${{ secrets.P12_PASSWORD }}
          keychain-password: ${{ secrets.KEYCHAIN_PASSWORD }}

      - name: Install provisioning profiles
        run: |
          set -euo pipefail

          PP_DIR=~/Library/MobileDevice/Provisioning\ Profiles
          mkdir -p "$PP_DIR"

          install_profile() {
            local secret_value="$1"
            local label="$2"
            local env_prefix="$3"

            if [ -z "$secret_value" ]; then
              echo "::error::${label} provisioning profile secret is empty"
              exit 1
            fi

            local mp="/tmp/${env_prefix}.mobileprovision"
            local plist="/tmp/${env_prefix}.plist"

            printf '%s' "$secret_value" | base64 --decode > "$mp" || {
              echo "::error::Failed to base64-decode ${label} provisioning profile"
              exit 1
            }

            if [ ! -s "$mp" ]; then
              echo "::error::${label} mobileprovision file is empty after decode"
              exit 1
            fi

            security cms -D -i "$mp" > "$plist" 2>/dev/null || {
              echo "::error::security cms -D failed for ${label} provisioning profile"
              exit 1
            }

            UUID=$(plutil -extract UUID raw -o - "$plist" 2>/dev/null || /usr/libexec/PlistBuddy -c "Print :UUID" "$plist" 2>/dev/null || true)
            NAME=$(plutil -extract Name raw -o - "$plist" 2>/dev/null || /usr/libexec/PlistBuddy -c "Print :Name" "$plist" 2>/dev/null || true)

            if [ -z "$UUID" ] || [ -z "$NAME" ]; then
              echo "::error::Failed to extract UUID or Name for ${label} profile (UUID='$UUID', NAME='$NAME')"
              echo "Plist excerpt for debugging:"
              grep -A1 -E "<key>(Name|UUID)</key>" "$plist" || true
              exit 1
            fi

            cp "$mp" "$PP_DIR/$UUID.mobileprovision"
            echo "Installed ${label} profile: $UUID ($NAME)"
            echo "${env_prefix}_UUID=$UUID" >> $GITHUB_ENV
            echo "${env_prefix}_NAME=$NAME" >> $GITHUB_ENV

            rm -f "$mp" "$plist"
          }

          install_profile "${{ secrets.PROVISIONING_PROFILE_BASE64 }}" "app" "APP_PROVISIONING"
          install_profile "${{ secrets.SHARE_PROVISIONING_PROFILE_BASE64 }}" "share" "SHARE_PROVISIONING"

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: false

      - name: Install root Ruby gems (CocoaPods)
        run: |
          bundle config set --local silence_root_warning 1 || true
          bundle config set force_ruby_platform true || true
          bundle install --jobs=4 --retry=3

      - name: Install Fastlane
        run: |
          bundle config set force_ruby_platform true || true
          bundle update fastlane --conservative || bundle install --jobs=4 --retry=3
        working-directory: fastlane

      - name: Collect Ruby native build logs
        if: failure()
        run: |
          echo "Looking for mkmf logs..."
          find /Users/runner/hostedtoolcache/Ruby -type f -name mkmf.log -print -exec echo "=== {} ===" \; -exec head -200 {} \; 2>/dev/null || true
        continue-on-error: true

      - name: Install CocoaPods dependencies
        run: |
          cd ios
          RCT_NEW_ARCH_ENABLED=0 bundle exec pod install --verbose

      # NOTE: Do NOT use --env ios.release here.
      # Fastlane's dotenv uses override:true which would clobber CI env vars
      # (e.g. SYNC_PROVISIONING_PROFILES=true from .env.ios.release triggers match).
      # All needed params are provided inline below; .env.default is loaded automatically.
      - name: Verify signing config before build
        run: |
          echo "=== Provisioning Profile Names (for export_options) ==="
          echo "APP_PROVISIONING_NAME: '${APP_PROVISIONING_NAME}'"
          echo "SHARE_PROVISIONING_NAME: '${SHARE_PROVISIONING_NAME}'"
          echo "APP_PROVISIONING_UUID: '${APP_PROVISIONING_UUID}'"
          echo "SHARE_PROVISIONING_UUID: '${SHARE_PROVISIONING_UUID}'"
          if [ -z "$APP_PROVISIONING_NAME" ] || [ -z "$SHARE_PROVISIONING_NAME" ]; then
            echo "::error::Provisioning profile names are empty! Export will fail."
            exit 1
          fi
          echo "=== Installed profiles ==="
          ls -la ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Build iOS signed IPA
        env:
          CI: "true"
          NODE_ENV: production
          BABEL_ENV: production
          NODE_OPTIONS: "--max_old_space_size=12000"
          APP_NAME: Dedalix
          REPLACE_ASSETS: "true"
          BUILD_FOR_RELEASE: "true"
          APP_SCHEME: optibot
          MAIN_APP_IDENTIFIER: com.optibot.cn
          EXTENSION_APP_IDENTIFIER: com.optibot.cn.MattermostShare
          IOS_APP_GROUP: group.com.optibot.cn
          IOS_ICLOUD_CONTAINER: iCloud.com.optibot.cn
          IOS_BUILD_EXPORT_METHOD: app-store
          FASTLANE_TEAM_ID: DAR9DHG22M
          FASTLANE_LOG_LEVEL: debug
          FASTLANE_DISABLE_COLORS: "1"
        run: bundle exec fastlane ios build
        working-directory: fastlane

      - name: Upload all build logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: all-build-logs-${{ github.run_id }}
          path: |
            fastlane/logs
            ~/Library/Logs/fastlane
            ~/Library/Logs/gym
            ~/Library/Logs/scan
        continue-on-error: true

      - name: Upload IPA artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa-${{ github.run_id }}
          path: "*.ipa"

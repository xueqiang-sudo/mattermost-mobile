---
name: Build on Push

on:
  push:
    branches:
      - main
      - master

env:
  NODE_VERSION: 22.14.0
  TERM: xterm

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install npm dependencies
        run: npm ci --ignore-scripts

      - name: Apply patches
        run: npx patch-package

      - name: Generate assets
        run: node scripts/generate-assets.js

      - name: Import Compass Icons font
        run: |
          cp node_modules/@mattermost/compass-icons/font/compass-icons.ttf assets/fonts/
          cp node_modules/@mattermost/compass-icons/font/compass-icons.ttf android/app/src/main/assets/fonts/

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Jetify Android libraries
        run: ./node_modules/.bin/jetify

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"

      - name: Install Fastlane
        run: bundle install
        working-directory: fastlane

      - name: Build Android APK
        env:
          CI: "true"
          NODE_ENV: production
          BABEL_ENV: production
          NODE_OPTIONS: "--max_old_space_size=12000"
        run: bundle exec fastlane android build --env android.release
        working-directory: fastlane

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-${{ github.run_id }}
          path: "*.apk"

  build-ios:
    name: Build iOS
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install npm dependencies
        run: npm ci --ignore-scripts

      - name: Apply patches
        run: npx patch-package

      - name: Generate assets
        run: node scripts/generate-assets.js

      - name: Import Compass Icons font
        run: |
          cp node_modules/@mattermost/compass-icons/font/compass-icons.ttf assets/fonts/
          cp node_modules/@mattermost/compass-icons/font/compass-icons.ttf android/app/src/main/assets/fonts/

      - name: Install signing certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          p12-password: ${{ secrets.P12_PASSWORD }}
          keychain-password: ${{ secrets.KEYCHAIN_PASSWORD }}

      - name: Install provisioning profiles
        run: |
          PP_DIR=~/Library/MobileDevice/Provisioning\ Profiles
          mkdir -p "$PP_DIR"

          # Decode and install main app profile (Xcode requires UUID-based filenames)
          echo "${{ secrets.PROVISIONING_PROFILE_BASE64 }}" | base64 --decode > /tmp/app.mobileprovision
          UUID=$(security cms -D -i /tmp/app.mobileprovision 2>/dev/null | plutil -extract UUID raw -)
          cp /tmp/app.mobileprovision "$PP_DIR/$UUID.mobileprovision"
          echo "Installed app profile: $UUID"

          # Decode and install share extension profile
          echo "${{ secrets.SHARE_PROVISIONING_PROFILE_BASE64 }}" | base64 --decode > /tmp/share.mobileprovision
          UUID=$(security cms -D -i /tmp/share.mobileprovision 2>/dev/null | plutil -extract UUID raw -)
          cp /tmp/share.mobileprovision "$PP_DIR/$UUID.mobileprovision"
          echo "Installed share profile: $UUID"

          rm -f /tmp/app.mobileprovision /tmp/share.mobileprovision

      # Root Gemfile has cocoapods; bundler-cache auto-runs bundle install at root
      - name: Setup Ruby & CocoaPods
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true

      - name: Install Fastlane
        run: bundle install
        working-directory: fastlane

      - name: Install CocoaPods dependencies
        run: |
          cd ios
          RCT_NEW_ARCH_ENABLED=0 bundle exec pod install --verbose

      # NOTE: Do NOT use --env ios.release here.
      # Fastlane's dotenv uses override:true which would clobber CI env vars
      # (e.g. SYNC_PROVISIONING_PROFILES=true from .env.ios.release triggers match).
      # All needed params are provided inline below; .env.default is loaded automatically.
      - name: Build iOS signed IPA
        env:
          CI: "true"
          NODE_ENV: production
          BABEL_ENV: production
          NODE_OPTIONS: "--max_old_space_size=12000"
          APP_NAME: Dedalix
          REPLACE_ASSETS: "true"
          BUILD_FOR_RELEASE: "true"
          APP_SCHEME: optibot
          MAIN_APP_IDENTIFIER: com.optibot.cn
          EXTENSION_APP_IDENTIFIER: com.optibot.cn.MattermostShare
          IOS_APP_GROUP: group.com.optibot.cn
          IOS_ICLOUD_CONTAINER: iCloud.com.optibot.cn
          IOS_BUILD_EXPORT_METHOD: app-store
          FASTLANE_TEAM_ID: DAR9DHG22M
        run: bundle exec fastlane ios build
        working-directory: fastlane

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa-${{ github.run_id }}
          path: "*.ipa"

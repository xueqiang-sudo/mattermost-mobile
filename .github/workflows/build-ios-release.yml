---
name: build-ios-release

on:
  push:
    branches:
      - build-release-[0-9]+
      - build-release-ios-[0-9]+
      - build-release-sim-[0-9]+

env:
  NODE_VERSION: 22.14.0
  TERM: xterm
  INTUNE_ENABLED: 'true'

jobs:
  test:
    runs-on: ubuntu-22.04
    steps:
      - name: ci/checkout-repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: ci/test
        uses: ./.github/actions/test

  build-and-deploy-ios-release:
    runs-on: macos-15-large
    if: ${{ !contains(github.ref_name, 'release-sim') }}
    needs:
      - test
    permissions:
      id-token: write
      contents: read
    steps:
      - name: ci/checkout-repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: ci/install-signing-certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
        run: |
          echo "$BUILD_CERTIFICATE_BASE64" | base64 --decode > /tmp/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"
          security import /tmp/build_certificate.p12 -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          rm /tmp/build_certificate.p12

      - name: ci/install-provisioning-profiles
        env:
          PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
          SHARE_PROVISIONING_PROFILE_BASE64: ${{ secrets.SHARE_PROVISIONING_PROFILE_BASE64 }}
        run: |
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"

          # Main App profile
          echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode > /tmp/main.mobileprovision
          UUID_MAIN=$(security cms -D -i /tmp/main.mobileprovision | /usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin)
          cp /tmp/main.mobileprovision "$HOME/Library/MobileDevice/Provisioning Profiles/$UUID_MAIN.mobileprovision"
          echo "PROVISIONING_PROFILE_MAIN_PATH=/tmp/main.mobileprovision" >> $GITHUB_ENV

          # Share Extension profile
          echo "$SHARE_PROVISIONING_PROFILE_BASE64" | base64 --decode > /tmp/share.mobileprovision
          UUID_SHARE=$(security cms -D -i /tmp/share.mobileprovision | /usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin)
          cp /tmp/share.mobileprovision "$HOME/Library/MobileDevice/Provisioning Profiles/$UUID_SHARE.mobileprovision"
          echo "PROVISIONING_PROFILE_SHARE_PATH=/tmp/share.mobileprovision" >> $GITHUB_ENV

      - name: ci/prepare-ios-build
        uses: ./.github/actions/prepare-ios-build
        with:
          intune-enabled: ${{ env.INTUNE_ENABLED }}
          intune-ssh-private-key: ${{ secrets.MM_MOBILE_INTUNE_DEPLOY_KEY }}

      - name: Configure AWS credentials bucket
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          aws-region: us-east-1
          role-to-assume: ${{ secrets.MM_MOBILE_RELEASE_AWS_ROLE_TO_ASSUME }}

      - name: ci/debug-signing-info
        run: |
          echo "=== Keychains ==="
          security list-keychains -d user
          echo "=== Identities ==="
          security find-identity -v -p codesigning
          echo "=== Provisioning Profiles ==="
          ls -la "$HOME/Library/MobileDevice/Provisioning Profiles/" || echo "No profiles dir"

      - name: ci/build-and-deploy-ios-release
        env:
          MATTERMOST_WEBHOOK_URL: "${{ secrets.MM_MOBILE_RELEASE_MATTERMOST_WEBHOOK_URL }}"
          FASTLANE_TEAM_ID: "${{ secrets.MM_MOBILE_FASTLANE_TEAM_ID }}"
          IOS_API_ISSUER_ID: "${{ secrets.IOS_API_ISSUER_ID }}"
          IOS_API_KEY: "${{ secrets.IOS_API_KEY }}"
          IOS_API_KEY_ID: "${{ secrets.IOS_API_KEY_ID }}"
          PROVISIONING_PROFILE_MAIN_PATH: /tmp/main.mobileprovision
          PROVISIONING_PROFILE_SHARE_PATH: /tmp/share.mobileprovision
          SENTRY_AUTH_TOKEN: "${{ secrets.MM_MOBILE_SENTRY_AUTH_TOKEN }}"
          SENTRY_DSN_IOS: ${{ secrets.MM_MOBILE_RELEASE_SENTRY_DSN_IOS }}
        run: |
          echo "::group::Build"
          bundle exec fastlane ios build --env ios.release
          echo "::endgroup::"
          echo "::group::Deploy to TestFlight"
          bundle exec fastlane ios deploy file:"${{ github.workspace }}/*.ipa" --env ios.release
          echo "::endgroup::"
        working-directory: ./fastlane

      - name: ci/upload-build-log
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: gym-build-log
          path: ~/Library/Logs/gym/React-Optibot.log

      - name: ci/upload-ios-release-to-s3-bucket
        env:
          AWS_BUCKET_NAME: "${{ secrets.MM_MOBILE_RELEASE_AWS_NEW_BUCKET_NAME }}"
          MATTERMOST_WEBHOOK_URL: "${{ secrets.MM_MOBILE_RELEASE_MATTERMOST_WEBHOOK_URL }}"
        run: |
          echo "::group::Upload to S3 bucket"
          bundle exec fastlane ios upload_artifacts_to_s3 --env ios.release s3_client_oidc:true
          echo "::endgroup::"
        working-directory: ./fastlane

      - name: ci/upload-ios-release-build
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ios-build-release-${{ github.run_id }}
          path: "*.ipa"

  build-ios-simulator:
    runs-on: macos-15-large
    if: ${{ !contains(github.ref_name , 'release-ios') }}
    needs:
      - test
    permissions:
      id-token: write
      contents: read
    steps:
      - name: ci/checkout-repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: ci/prepare-ios-build
        uses: ./.github/actions/prepare-ios-build
        with:
          intune-enabled: ${{ env.INTUNE_ENABLED }}
          intune-ssh-private-key: ${{ secrets.MM_MOBILE_INTUNE_DEPLOY_KEY }}

      - name: Configure AWS credentials s3 bucket for simulator
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          aws-region: us-east-1
          role-to-assume: ${{ secrets.MM_MOBILE_RELEASE_AWS_ROLE_TO_ASSUME }}

      - name: ci/build-ios-simulator
        env:
          TAG: "${{ github.ref_name }}"
          MATTERMOST_WEBHOOK_URL: "${{ secrets.MM_MOBILE_BETA_MATTERMOST_WEBHOOK_URL }}"
          GITHUB_TOKEN: "${{ secrets.MM_MOBILE_GITHUB_TOKEN }}"
        run: bundle exec fastlane ios simulator --env ios.simulator
        working-directory: ./fastlane

      - name: ci/upload-ios-simulator-s3-bucket
        env:
          TAG: "${{ github.ref_name }}"
          AWS_BUCKET_NAME: "${{ secrets.MM_MOBILE_RELEASE_AWS_NEW_BUCKET_NAME }}"
          MATTERMOST_WEBHOOK_URL: "${{ secrets.MM_MOBILE_BETA_MATTERMOST_WEBHOOK_URL }}"
        run: bundle exec fastlane ios upload_artifacts_to_s3 --env ios.simulator output_file:"Mattermost-simulator-x86_64.app.zip" s3_client_oidc:true
        working-directory: ./fastlane

      - name: ci/upload-ios-pr-simulator
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ios-build-simulator-${{ github.run_id }}
          path: Mattermost-simulator-x86_64.app.zip
